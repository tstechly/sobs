# OpenTelemetry Collector (daemonset mode) for node-level Kubernetes telemetry.
# Apply with:
#   helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
#   helm install sobs-k8s-daemonset open-telemetry/opentelemetry-collector -f k8s/otel-k8s-daemonset.yaml

mode: daemonset

image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.123.0

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["nodes/proxy"]
      verbs: ["get"]

presets:
  logsCollection:
    enabled: true
  hostMetrics:
    enabled: true
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: true
    extractAllPodAnnotations: true
  kubeletMetrics:
    enabled: true

extraEnvs:
  - name: SOBS_OTLP_HTTP_ENDPOINT
    value: http://sobs:4318

config:
  receivers:
    kubeletstats:
      collection_interval: 20s
      auth_type: serviceAccount
      endpoint: ${env:K8S_NODE_NAME}:10250
      insecure_skip_verify: true
  exporters:
    otlphttp/sobs:
      endpoint: "${env:SOBS_OTLP_HTTP_ENDPOINT}"
      compression: gzip
  service:
    pipelines:
      logs:
        exporters: [otlphttp/sobs]
      metrics:
        exporters: [otlphttp/sobs]
