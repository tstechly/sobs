---
# SOBS as a sidecar container in an existing Pod
# Add this container block to your existing Deployment's spec.containers list.
#
# Example – add to your app Deployment:
#
#   spec:
#     containers:
#       - name: my-app
#         image: my-app:latest
#         ...
#       - name: sobs
#         image: ghcr.io/abartrim/sobs:latest
#         ports:
#           - containerPort: 4317
#         env:
#           - name: SOBS_DATA_DIR
#             value: /data
#           - name: SOBS_AI_ENDPOINT_URL
#             valueFrom:
#               configMapKeyRef:
#                 name: sobs-config
#                 key: ai-endpoint-url
#                 optional: true
#           - name: SOBS_AI_MODEL
#             valueFrom:
#               configMapKeyRef:
#                 name: sobs-config
#                 key: ai-model
#                 optional: true
#           - name: SOBS_AI_API_KEY
#             valueFrom:
#               secretKeyRef:
#                 name: sobs-secret
#                 key: ai-api-key
#                 optional: true
#           - name: SOBS_AI_GUARD_ENDPOINT_URL
#             valueFrom:
#               configMapKeyRef:
#                 name: sobs-config
#                 key: ai-guard-endpoint-url
#                 optional: true
#           - name: SOBS_AI_GUARD_MODEL
#             valueFrom:
#               configMapKeyRef:
#                 name: sobs-config
#                 key: ai-guard-model
#                 optional: true
#           - name: SOBS_AI_DLP_ENDPOINT_URL
#             valueFrom:
#               configMapKeyRef:
#                 name: sobs-config
#                 key: ai-dlp-endpoint-url
#                 optional: true
#           - name: SOBS_AI_API_KEY_FILE
#             value: /var/run/secrets/sobs/ai-api-key
#         volumeMounts:
#           - name: sobs-data
#             mountPath: /data
#           - name: sobs-secret-files
#             mountPath: /var/run/secrets/sobs
#             readOnly: true
#         resources:
#           requests:
#             memory: "32Mi"
#             cpu: "20m"
#           limits:
#             memory: "128Mi"
#             cpu: "100m"
#     volumes:
#       - name: sobs-data
#         emptyDir: {}
#       - name: sobs-secret-files
#         secret:
#           secretName: sobs-secret-files
#           optional: true
#
# Your app can send OTLP data to http://localhost:4317/v1/logs etc.
# Access the SOBS UI by port-forwarding to a non-default local port:
#   kubectl port-forward pod/<pod-name> 44317:4317
