name: Dependency Review

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Check for vulnerable dependencies
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high