name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            .github/workflows/ci.yml

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        # --strict is omitted because jinja-bootstrap-spa is a pinned Git dependency
        # (not yet published on PyPI); pip-audit --strict fails when it cannot resolve
        # any dependency, and VCS packages are inherently unresolvable from PyPI.
        # All other PyPI packages are still audited normally; jinja-bootstrap-spa is
        # reported as "skipped: Dependency not found on PyPI" which is the expected
        # outcome for this intentional first-consumer POC dependency.
        run: pip-audit -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --omit=dev --audit-level=high

  rum-build:
    name: RUM JS Build & Type Check
    runs-on: ubuntu-latest
    needs: dependency-audit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Type-check rum.d.ts
        run: npm run typecheck:rum

      - name: Build rum assets (dev + prod)
        run: npm run build:rum

      - name: Verify minified output exists
        run: |
          test -f static/rum.min.js   || (echo "rum.min.js missing" && exit 1)
          test -f static/rum.min.js.map || (echo "rum.min.js.map missing" && exit 1)
          test -f static/rum.js.map   || (echo "rum.js.map missing" && exit 1)

      - name: Upload rum.min.js.map artifact
        uses: actions/upload-artifact@v7
        with:
          name: rum-min-js-sourcemap
          path: static/rum.min.js.map
          if-no-files-found: error

  lint:
    name: Code Style & Linting
    runs-on: ubuntu-latest
    needs: dependency-audit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            .github/workflows/ci.yml
            .github/cache-key-lint.txt

      - name: Install linting dependencies
        run: pip install black isort flake8 mypy djlint flask

      - name: Run black
        run: black --check .

      - name: Run isort
        run: isort --check-only .

      - name: Run flake8
        run: flake8 .

      - name: Run mypy
        run: mypy app.py

      - name: Run djlint
        run: python3 scripts/run_djlint.py --check --lint templates

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-integration.txt
            pyproject.toml
            .github/workflows/ci.yml
            .github/cache-key-runtime.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-integration.txt

      - name: Run unit tests with coverage
        run: |
          echo "SOBS/chDB env snapshot"
          env | sort | grep -E '^(SOBS_|CHDB_)' || true
          pytest tests --ignore=tests/test_integration.py -x --maxfail=1 -vv \
            --cov=app --cov=masking --cov=mcp \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Diff coverage gate
        run: diff-cover coverage.xml --compare-branch=origin/main --fail-under=90

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-integration.txt
            pyproject.toml
            .github/workflows/ci.yml
            .github/cache-key-runtime.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements-integration.txt', '.github/workflows/ci.yml', '.github/cache-key-runtime.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-integration.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run integration tests
        env:
          SOBS_UIQA_SEED_TOTAL: "64"
          SOBS_UIQA_SEED_WORKERS: "8"
          SOBS_SCREENSHOT_SEED_TOTAL: "240"
          SOBS_SCREENSHOT_SEED_WORKERS: "24"
          # Disable the chDB server memory cap in CI. The limit is a production
          # safeguard for constrained containers; the CI runner has ample RAM and
          # enforcing it only causes false failures as baseline RSS varies.
          SOBS_CHDB_MAX_SERVER_MB: "0"
        run: pytest tests/test_integration.py -v

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-screenshots
          path: tests/screenshots/
          if-no-files-found: warn

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: integration
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Resolve build version
        id: build_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SOBS_BUILD_VERSION=${{ steps.build_version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  register-sobs-release:
    name: Register SOBS Release Metadata
    runs-on: ubuntu-latest
    needs: [docker, rum-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: read
    env:
      SOBS_BASE_URL: ${{ secrets.SOBS_URL }}
      SOBS_API_KEY: ${{ secrets.SOBS_INGEST_API_KEY }}
    steps:
      - name: Determine whether SOBS registration is enabled
        id: sobs_gate
        run: |
          if [[ -z "${SOBS_BASE_URL}" || -z "${SOBS_API_KEY}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6

      - name: Set up Python
        if: steps.sobs_gate.outputs.enabled == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up QEMU for cross-platform image inspection
        uses: docker/setup-qemu-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release version
        id: release_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve deterministic release id
        id: release_id
        run: |
          release_key="${GITHUB_REPOSITORY}|${{ steps.release_version.outputs.value }}|${GITHUB_SHA}|${GITHUB_RUN_ID}|production"
          release_id=$(printf "%s" "${release_key}" | shasum -a 256 | awk '{print $1}')
          echo "value=${release_id}" >> "$GITHUB_OUTPUT"

      - name: Download rum.min.js.map artifact
        uses: actions/download-artifact@v6
        with:
          name: rum-min-js-sourcemap
          path: static

      - name: Extract resolved dependency snapshots from published image (per arch)
        run: |
          set -euo pipefail
          mkdir -p .sobs-release
          image_ref="ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_SHA}"
          for arch in amd64 arm64; do
            lock_file=".sobs-release/pip-freeze-linux-${arch}.txt"
            docker run --rm --platform "linux/${arch}" "${image_ref}" \
              sh -lc 'python -m pip freeze --all' > "${lock_file}"
            if [[ ! -s "${lock_file}" ]]; then
              echo "Dependency snapshot extraction failed for ${arch}" >&2
              exit 1
            fi
          done

      - name: Upload per-arch dependency snapshots
        uses: actions/upload-artifact@v7
        with:
          name: sobs-release-dependency-snapshots
          path: .sobs-release/pip-freeze-linux-*.txt
          if-no-files-found: error

      - name: Register release and artifact metadata (linux/amd64)
        if: steps.sobs_gate.outputs.enabled == 'true'
        env:
          SOBS_APP_NAME: sobs
          SOBS_APP_SLUG: sobs
          SOBS_APP_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          SOBS_DEFAULT_ENVIRONMENT: production
          SOBS_RELEASE_VERSION: ${{ steps.release_version.outputs.value }}
          SOBS_RELEASE_COMMIT_SHA: ${{ github.sha }}
          SOBS_RELEASE_BUILD_ID: ${{ github.run_id }}
          SOBS_RELEASE_ENVIRONMENT: production
          SOBS_RELEASE_ID: ${{ steps.release_id.outputs.value }}
        run: |
          set -euo pipefail
          dep_file=".sobs-release/pip-freeze-linux-amd64.txt"
          rum_size=$(wc -c < static/rum.min.js.map)
          dep_size=$(wc -c < "${dep_file}")
          rum_sha=$(shasum -a 256 static/rum.min.js.map | awk '{print $1}')
          dep_sha=$(shasum -a 256 "${dep_file}" | awk '{print $1}')
          python scripts/register_release_artifacts.py \
            --requirements-file "${dep_file}" \
            --dependencies-name "pip-freeze-linux-amd64" \
            --dependencies-storage-ref "ci://artifacts/pip-freeze-linux-amd64.txt" \
            --dependencies-checksum-sha256 "${dep_sha}" \
            --dependencies-size "${dep_size}" \
            --dependencies-platform "linux" \
            --dependencies-architecture "amd64" \
            --artifacts-json "[{\"artifactType\":\"js_sourcemap\",\"name\":\"rum.min.js.map\",\"contentType\":\"application/json\",\"size\":${rum_size},\"storageRef\":\"ci://artifacts/rum.min.js.map\",\"checksumSha256\":\"${rum_sha}\",\"platform\":\"linux\",\"architecture\":\"multi\"}]"

      - name: Register dependency metadata (linux/arm64)
        if: steps.sobs_gate.outputs.enabled == 'true'
        env:
          SOBS_APP_NAME: sobs
          SOBS_APP_SLUG: sobs
          SOBS_APP_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          SOBS_DEFAULT_ENVIRONMENT: production
          SOBS_RELEASE_VERSION: ${{ steps.release_version.outputs.value }}
          SOBS_RELEASE_COMMIT_SHA: ${{ github.sha }}
          SOBS_RELEASE_BUILD_ID: ${{ github.run_id }}
          SOBS_RELEASE_ENVIRONMENT: production
          SOBS_RELEASE_ID: ${{ steps.release_id.outputs.value }}
        run: |
          set -euo pipefail
          dep_file=".sobs-release/pip-freeze-linux-arm64.txt"
          dep_size=$(wc -c < "${dep_file}")
          dep_sha=$(shasum -a 256 "${dep_file}" | awk '{print $1}')
          python scripts/register_release_artifacts.py \
            --requirements-file "${dep_file}" \
            --dependencies-name "pip-freeze-linux-arm64" \
            --dependencies-storage-ref "ci://artifacts/pip-freeze-linux-arm64.txt" \
            --dependencies-checksum-sha256 "${dep_sha}" \
            --dependencies-size "${dep_size}" \
            --dependencies-platform "linux" \
            --dependencies-architecture "arm64"

  cleanup-ghcr:
    name: Cleanup Stale GHCR Versions
    runs-on: ubuntu-latest
    needs: docker
    if: false # Disabled: issue #223 - cleanup is too aggressive and removes the latest tag
    permissions:
      packages: write
    steps:
      - name: Delete untagged GHCR versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: sobs
          package-type: container
          delete-only-untagged-versions: true

      - name: Delete old SHA-tagged versions (keep latest + v* releases)
        uses: actions/delete-package-versions@v5
        with:
          package-name: sobs
          package-type: container
          delete-only-untagged-versions: false
          ignore-versions: '^(latest|v\d+\..*)$'
          min-versions-to-keep: 1
