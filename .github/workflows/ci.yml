name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            .github/workflows/ci.yml

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt --strict

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --omit=dev --audit-level=high

  rum-build:
    name: RUM JS Build & Type Check
    runs-on: ubuntu-latest
    needs: dependency-audit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Type-check rum.d.ts
        run: npm run typecheck:rum

      - name: Build rum assets (dev + prod)
        run: npm run build:rum

      - name: Verify minified output exists
        run: |
          test -f static/rum.min.js   || (echo "rum.min.js missing" && exit 1)
          test -f static/rum.min.js.map || (echo "rum.min.js.map missing" && exit 1)
          test -f static/rum.js.map   || (echo "rum.js.map missing" && exit 1)

  lint:
    name: Code Style & Linting
    runs-on: ubuntu-latest
    needs: dependency-audit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            .github/workflows/ci.yml
            .github/cache-key-lint.txt

      - name: Install linting dependencies
        run: pip install black isort flake8 mypy flask

      - name: Run black
        run: black --check .

      - name: Run isort
        run: isort --check-only .

      - name: Run flake8
        run: flake8 .

      - name: Run mypy
        run: mypy app.py

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-integration.txt
            pyproject.toml
            .github/workflows/ci.yml
            .github/cache-key-runtime.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run unit tests
        run: |
          echo "SOBS/chDB env snapshot"
          env | sort | grep -E '^(SOBS_|CHDB_)' || true
          pytest tests --ignore=tests/test_integration.py -x --maxfail=1 -vv

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-integration.txt
            pyproject.toml
            .github/workflows/ci.yml
            .github/cache-key-runtime.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements-integration.txt', '.github/workflows/ci.yml', '.github/cache-key-runtime.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-integration.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run integration tests
        env:
          SOBS_UIQA_SEED_TOTAL: "64"
          SOBS_UIQA_SEED_WORKERS: "8"
          SOBS_SCREENSHOT_SEED_TOTAL: "240"
          SOBS_SCREENSHOT_SEED_WORKERS: "24"
        run: pytest tests/test_integration.py -v

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-screenshots
          path: tests/screenshots/
          if-no-files-found: warn

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: integration
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Resolve build version
        id: build_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SOBS_BUILD_VERSION=${{ steps.build_version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup-ghcr:
    name: Cleanup Stale GHCR Versions
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      packages: write
    steps:
      - name: Delete untagged GHCR versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: sobs
          package-type: container
          delete-only-untagged-versions: true

      - name: Delete old SHA-tagged versions (keep latest + v* releases)
        uses: actions/delete-package-versions@v5
        with:
          package-name: sobs
          package-type: container
          delete-only-untagged-versions: false
          ignore-versions: '^(latest|v\d+\..*)$'
          min-versions-to-keep: 0

  sobs-release:
    name: Register Sobs Release Metadata
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    continue-on-error: true
    permissions:
      contents: read
    env:
      SOBS_URL: ${{ secrets.SOBS_URL }}
      SOBS_API_KEY: ${{ secrets.SOBS_API_KEY }}
      SOBS_BASIC_AUTH: ${{ secrets.SOBS_BASIC_AUTH }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Resolve release version
        id: release_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Register release, Python dependencies, and JS source maps
        if: env.SOBS_URL != '' && env.SOBS_API_KEY != ''
        run: |
          python scripts/register_release_artifacts.py \
            --base-url "$SOBS_URL" \
            --app-name sobs \
            --repo-url "https://github.com/${{ github.repository }}" \
            --release-version "${{ steps.release_version.outputs.value }}" \
            --commit-sha "${{ github.sha }}" \
            --build-id "${{ github.run_id }}" \
            --environment production \
            --requirements-file requirements.txt \
            --artifacts-json '[{"artifactType":"js_sourcemap","name":"rum.min.js.map","contentType":"application/json","storageRef":"static/rum.min.js.map","size":0,"checksumSha256":"","platform":"","architecture":""},{"artifactType":"js_sourcemap","name":"rum.js.map","contentType":"application/json","storageRef":"static/rum.js.map","size":0,"checksumSha256":"","platform":"","architecture":""}]'

      - name: Register npm dependencies
        if: env.SOBS_URL != '' && env.SOBS_API_KEY != ''
        run: |
          DEPS=$(python3 -c "
          import json
          lock = json.load(open('package-lock.json'))
          deps = [
              {'package': k.replace('node_modules/', '', 1), 'version': v['version'], 'ecosystem': 'npm'}
              for k, v in (lock.get('packages') or {}).items()
              if k and k != '' and isinstance(v, dict) and v.get('version')
          ]
          print(json.dumps(deps))
          ")
          python scripts/register_release_artifacts.py \
            --base-url "$SOBS_URL" \
            --app-name sobs \
            --release-version "${{ steps.release_version.outputs.value }}" \
            --commit-sha "${{ github.sha }}" \
            --build-id "${{ github.run_id }}" \
            --environment production \
            --dependencies-json "$DEPS" \
            --dependencies-name "package-lock.json"

      - name: Trigger CVE scan
        if: env.SOBS_URL != '' && env.SOBS_BASIC_AUTH != ''
        run: |
          curl -sf -X POST "${SOBS_URL}/api/enrichment/cve/scan" \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic ${SOBS_BASIC_AUTH}" \
            -d '{}' \
            || echo "CVE scan trigger failed (non-fatal)"
