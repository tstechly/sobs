{% macro render_filter_accordion(accordion_id, heading_id, panel_id, icon_class, tz_btn_id, tz_label_id, show_active_badge=false) -%}
<div class="accordion mb-3" id="{{ accordion_id }}">
  <div class="accordion-item border-secondary">
    <h2 class="accordion-header" id="{{ heading_id }}">
      <button class="accordion-button py-2" type="button"
              data-bs-toggle="collapse" data-bs-target="#{{ panel_id }}"
              aria-expanded="true" aria-controls="{{ panel_id }}">
        <i class="bi bi-funnel me-2 {{ icon_class }}"></i>
        <span class="fw-semibold">Filters</span>
        <span id="{{ tz_btn_id }}" class="sobs-tz-header-badge{% if show_active_badge %} ms-2{% endif %}" role="button" tabindex="0" title="Display timezone - click to change">
          <i class="bi bi-clock"></i>
          <span id="{{ tz_label_id }}">UTC</span>
        </span>
        {% if show_active_badge %}
          <span class="badge bg-primary ms-2">Active</span>
        {% endif %}
      </button>
    </h2>
    <div id="{{ panel_id }}" class="accordion-collapse collapse show" aria-labelledby="{{ heading_id }}" data-bs-parent="#{{ accordion_id }}">
      <div class="accordion-body py-3">
        {{ caller() }}
      </div>
    </div>
  </div>
</div>
{%- endmacro %}
