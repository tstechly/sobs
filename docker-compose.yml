version: "3.9"

services:
  sobs:
    build: .
    image: ghcr.io/abartrim/sobs:latest
    container_name: sobs
    ports:
      - "4317:4317"
    volumes:
      - sobs_data:/data
    environment:
      # Optional API key – leave empty to disable auth
      - SOBS_API_KEY=
      # Set to "1" to enable Flask debug mode (dev only)
      - FLASK_DEBUG=0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4317/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sobs_data:
